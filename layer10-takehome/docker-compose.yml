version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: layer10-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-layer10}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-layer10pass}
      POSTGRES_DB: ${POSTGRES_DB:-layer10}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-layer10}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
